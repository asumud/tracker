<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Virtual Voyage To Gaza</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html, body {
  margin:0; padding:0; height:100%;
  background:black; color:white; font-family:Arial;
}

#sidebar {
  width:280px;
  height:100%;
  float:left;
  background:#111;
  padding:15px;
  box-sizing:border-box;
  overflow-y:auto;
}

#map {
  width:calc(100% - 280px);
  height:100%;
  float:right;
}

h1 {
  font-size:18px;
  text-align:center;
}

.boat-item {
  padding:6px;
  margin-top:6px;
  background:#222;
  border-radius:5px;
  cursor:pointer;
}
.boat-item:hover { background:#333; }
.boat-item.active { border-left:4px solid #1E90FF; }

.flashing-dot {
  width:10px; height:10px;
  background:limegreen;
  border-radius:50%;
  display:inline-block;
  animation:flash 1s infinite;
}
@keyframes flash {
  0%,100%{opacity:1}
  50%{opacity:0}
}
</style>
</head>

<body>

<div id="sidebar">
  <h1>Virtual Voyage To Gaza <span class="flashing-dot"></span></h1>
  <div id="boat-list"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([32.6, 28.9], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

const trailLayer = L.layerGroup().addTo(map);

let markers = {};
let pulses = {};
let pulseIntervals = {};
let data = {};

// LOAD DATA
async function loadData(){
  try {
    const res = await fetch('position.json?t=' + Date.now());
    data = await res.json();
    updateMap();
    updateSidebar();
  } catch (err) {
    console.log("Fetch error:", err);
  }
}

// UPDATE MAP
function updateMap(){
  trailLayer.clearLayers();

  for(const ship in data){
    const history = data[ship];
    if(!history || history.length === 0) continue;

    const last = history[history.length - 1];

    if(markers[ship]) map.removeLayer(markers[ship]);
    if(pulses[ship]) map.removeLayer(pulses[ship]);
    if(pulseIntervals[ship]) clearInterval(pulseIntervals[ship]);

    const marker = L.circleMarker([last.lat, last.lon], {
      radius:6,
      color:'#1E90FF',
      fillColor:'#1E90FF',
      fillOpacity:1
    }).addTo(map);

    markers[ship] = marker;

    const pulse = L.circle([last.lat, last.lon], {
      radius:200,
      color:'#1E90FF',
      fillColor:'#1E90FF',
      fillOpacity:0.2
    }).addTo(map);

    pulses[ship] = pulse;

    let size = 200;
    let grow = true;

    pulseIntervals[ship] = setInterval(() => {
      size += grow ? 25 : -25;
      if(size > 500) grow = false;
      if(size < 200) grow = true;
      pulse.setRadius(size);
    }, 300);

    if(history.length > 1){
      const coords = history.map(p => [p.lat, p.lon]);

      L.polyline(coords, {
        color:'#1E90FF',
        weight:2,
        opacity:0.8
      }).addTo(trailLayer);
    }

    map.setView([last.lat, last.lon], 6);
  }
}

// SIDEBAR
function updateSidebar(){
  const list = document.getElementById("boat-list");
  list.innerHTML = "";

  for(const ship in data){
    const history = data[ship];
    if(!history.length) continue;

    const last = history[history.length - 1];

    const div = document.createElement("div");
    div.className = "boat-item";

    div.innerHTML = `
      <b>${ship}</b><br>
      Speed: ${last.speed || 0} kn
    `;

    div.onclick = () => {
      map.flyTo([last.lat, last.lon], 10);
    };

    list.appendChild(div);
  }
}

// LOOP
loadData();
setInterval(loadData, 60000);

</script>

</body>
</html>
